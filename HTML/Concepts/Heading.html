<!-- *------------------------------------- -->
<!--* 1: HTML HEADING ELEMENTS
<!-- *---------------------------------------- -->

<!--? The <h1> to <h6> tags create headings in HTML, where <h1> is the biggest and most important, and <h6> is the smallest and least important. -->

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>THE BEST HTML COURSE</h1>
    <h2>THE BEST HTML COURSE</h2>
    <h3>THE BEST HTML COURSE</h3>
    <h4>THE BEST HTML COURSE</h4>
    <h5>THE BEST HTML COURSE</h5>
    <h6>THE BEST HTML COURSE</h6>
  </body>
</html>

<!-- *------------------------------------- -->
<!--* NOTES - HTML HEADING ELEMENTS
<!-- *---------------------------------------- -->

<!--* The tag's element name is case-insensitive. -->
<!--* A single H1 is typically used per page. -->
<!--* Follow the hierarchy from H1 to H6 consistently. -->

<!--: What happens if you skip heading levels, such as going from <h1> to <h3>? -->
Skipping heading levels can confuse both users and search engines. It's best to
maintain a proper hierarchical structure for better accessibility and SEO.
