<!--* Void Elements / EMPTY ELEMENTS -->

<!--? Not all parts of a web page use the usual pattern of having an opening tag, some content, and then a closing tag.
        Some parts only need a single tag to work. These are called "void elements. -->


<!-- Here are a few more examples of void elements:

1. <img>: This is used to insert images. You only need to use <img> and provide attributes like src (source) and alt (alternate text).

2. <input>: This is used for input fields, like text boxes or checkboxes.

3. <link>: This is used to connect to external resources like stylesheets or icons.

4. <hr>: This creates a horizontal line to separate content.
-->
