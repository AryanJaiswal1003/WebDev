<!-- *------------------------------------- -->
<!--* HTML LANGUAGE ATTRIBUTE (lang) -->
<!-- *---------------------------------------- -->

<!--
The lang attribute specifies the language of the HTML document.

Benefits:
1. Helps search engines understand the page language.
2. Improves accessibility for screen readers.
3. Assists browsers with language-specific features.

Example:
<html lang="en">  -> English
<html lang="hi">  -> Hindi
<html lang="fr">  -> French
<html lang="ja">  -> Japanese
-->

<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>मेरी वेबसाइट</title>
    <style>
        nav ul{
            list-style:none;
            display:flex;
            gap:20px;
            padding:0;
        }
    </style>
</head>

<body>
    <header>
      <h1>मेरी वेबसाइट</h1>
      <nav>
        <ul>
          <li><a href="#">होम</a></li>
          <li><a href="#">विशेषताएँ</a></li>
          <li><a href="#">सेवाएँ</a></li>
          <li><a href="#">संपर्क</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <section>
        <h2>हमारे बारे में</h2>
        <p>
            यह वेबसाइट पूरी तरह हिंदी भाषा में बनाई गई है।
            HTML में किसी भी भाषा का उपयोग किया जा सकता है।
        </p>
      </section>

      <section>
        <h2>सेवाएँ</h2>
        <p>यहाँ हमारी विभिन्न सेवाओं की जानकारी उपलब्ध है।</p>
      </section>

      <section>
        <h2>संपर्क करें</h2>
        <p>अधिक जानकारी के लिए हमसे संपर्क करें।</p>
      </section>
    </main>

    <footer>
      <p>&copy; 2026 मेरी वेबसाइट</p>
    </footer>

</body>
</html>

<!-- *------------------------------------- -->
<!--* IMPORTANT NOTES
<!-- *---------------------------------------- -->

<!--

lang Attribute
--------------

The lang attribute specifies the language
of the webpage.

Examples:

<html lang="en">   English

<html lang="hi">   Hindi

<html lang="fr">   French

<html lang="es">   Spanish

<html lang="ja">   Japanese

-------------------------------------------------

Benefits of using the lang attribute

• Improves accessibility.
• Helps screen readers pronounce text correctly.
• Helps search engines identify the page language.
• Improves browser language support.

-->
