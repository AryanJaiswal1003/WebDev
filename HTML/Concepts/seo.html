<!-- *------------------------------------- -->
<!--* HTML META TAGS & SEO
<!-- *---------------------------------------- -->

<!--
Meta tags provide metadata (information about the webpage).

They are placed inside the <head> section of an HTML document.

Meta tags are NOT visible on the webpage but are used by:

1. Browsers
2. Search Engines
3. Social Media Platforms
4. Other Web Services

They help improve SEO, accessibility, responsiveness,
and browser compatibility.
-->

<!DOCTYPE html>
<html lang="en">
<head>

    <!-- Character Encoding -->

    <meta charset="UTF-8">

    <!-- Responsive Design -->

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <!-- Page Description -->

    <meta
        name="description"
        content="Learn HTML, CSS, JavaScript, and Web Development through simple tutorials and practical projects."
    >

    <!-- Keywords (Mostly ignored by modern search engines) -->

    <meta
        name="keywords"
        content="HTML, CSS, JavaScript, Web Development, Frontend, Backend"
    >

    <!-- Author -->

    <meta
        name="author"
        content="Your Name"
    >

    <!-- Search Engine Crawlers -->

    <meta
        name="robots"
        content="index, follow"
    >

    <!-- Open Graph Meta Tags (Social Sharing) -->

    <meta property="og:title" content="Learn Web Development">

    <meta
        property="og:description"
        content="Complete tutorials on HTML, CSS, JavaScript, and Full Stack Development."
    >

    <meta
        property="og:image"
        content="./images/html.png"
    >

    <meta
        property="og:type"
        content="website"
    >

    <title>Learn Web Development | HTML Tutorials</title>

</head>

<body>

    <h1>Welcome to Learn Web Development</h1>

    <p>
        This webpage demonstrates commonly used HTML
        meta tags and basic SEO practices.
    </p>

</body>
</html>



<!-- *------------------------------------- -->
<!--* IMPORTANT META TAGS
<!-- *---------------------------------------- -->

<!--

<meta charset="UTF-8">
-----------------------

Defines the character encoding.

UTF-8 supports almost every language and symbol.

-------------------------------------------------

<meta name="viewport">
---------------------

Makes the webpage responsive on mobile devices.

Example:

width=device-width

initial-scale=1.0

-------------------------------------------------

<meta name="description">
------------------------

Provides a short summary of the webpage.

Search engines often display this
description in search results.

-------------------------------------------------

<meta name="keywords">
---------------------

Lists keywords related to the webpage.

Note:

Modern search engines such as Google
largely ignore this tag.

-------------------------------------------------

<meta name="author">
-------------------

Specifies the author of the webpage.

-------------------------------------------------

<meta name="robots">
-------------------

Controls how search engines crawl
the webpage.

Common Values:

index

noindex

follow

nofollow

Example:

index, follow

-->



<!-- *------------------------------------- -->
<!--* OPEN GRAPH (OG) META TAGS
<!-- *---------------------------------------- -->

<!--

Open Graph tags control how your webpage
appears when shared on social media.

Examples:

Facebook

LinkedIn

WhatsApp

Discord

Twitter (uses Twitter Cards)

Common OG Tags:

og:title

og:description

og:image

og:type

og:url

-->



<!-- *------------------------------------- -->
<!--* WHAT IS SEO?
<!-- *---------------------------------------- -->

<!--

SEO = Search Engine Optimization

SEO is the process of improving a website's
visibility in search engine results.

The better your SEO,
the higher your webpage can rank.

-->



<!-- *------------------------------------- -->
<!--* TOP SEO PRACTICES
<!-- *---------------------------------------- -->

<!--

1. Use a descriptive <title>.

2. Add a meaningful meta description.

3. Use only ONE <h1> per page.

4. Follow a proper heading hierarchy.

5. Use Semantic HTML.

6. Add descriptive alt text to images.

7. Compress images and use WebP when possible.

8. Use lazy loading for images.

9. Make your website mobile-friendly.

10. Improve page loading speed.

11. Use meaningful URLs.

12. Add internal links.

13. Link to trusted external resources.

14. Use Open Graph meta tags.

15. Keep content original and high quality.

-->



<!-- *------------------------------------- -->
<!--* INTERVIEW QUESTIONS
<!-- *---------------------------------------- -->

<!--

1. What are Meta Tags?

Meta tags provide metadata about a webpage.
They are placed inside the <head> section.

-------------------------------------------------

2. Are Meta Tags visible to users?

No.

They are mainly used by browsers,
search engines, and social media platforms.

-------------------------------------------------

3. What is the purpose of
<meta charset="UTF-8">?

It specifies the character encoding
used by the webpage.

-------------------------------------------------

4. Why is the viewport meta tag important?

It makes webpages responsive
on different screen sizes.

-------------------------------------------------

5. What does the robots meta tag do?

It tells search engines whether
to index the page and follow links.

Example:

index, follow

-------------------------------------------------

6. Does Google use the keywords meta tag?

Google largely ignores the
keywords meta tag today.

-------------------------------------------------

7. What is SEO?

SEO stands for
Search Engine Optimization.

It improves a website's visibility
in search engine results.

-------------------------------------------------

8. What are Open Graph tags?

Open Graph tags control how
a webpage appears when shared
on social media platforms.

-->
